<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Reis Domino Ausus</title>

<style>
body{
  font-family: Arial;
  background:#0a2a66;
  color:white;
  text-align:center;
}

button{
  padding:15px;
  margin:10px;
  font-size:18px;
  background:#1976d2;
  color:white;
  border:none;
  border-radius:8px;
}

input{
  padding:10px;
  font-size:16px;
  border-radius:5px;
  border:none;
}
</style>
</head>

<body>

<h1>🎲 Reis Domino Ausus</h1>
<p>Criado por Jonathan</p>

<button onclick="criarSala()">Criar Sala</button>

<br><br>

<input id="codigo" placeholder="Código da sala">

<br><br>

<button onclick="entrar()">Entrar</button>

<script>
function criarSala(){
  const code = Math.random().toString(36).substr(2,5).toUpperCase();
  location.href = "game.html?room=" + code;
}

function entrar(){
  const c = document.getElementById("codigo").value;
  if(c){
    location.href = "game.html?room=" + c;
  }
}
</script>

</body>
</html>

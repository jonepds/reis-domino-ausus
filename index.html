<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reis Dominó Ausus</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

#mesa{
margin-top:30px;
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.peça{
width:70px;
height:130px;
background:white;
color:black;
border-radius:12px;
margin:6px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:bold;
}

button{
margin-top:20px;
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
}

</style>

</head>

<body>

<h1>Reis Dominó Ausus</h1>
<p>Criado por Jonathan</p>

<button onclick="iniciar()">Começar jogo</button>

<div id="mesa"></div>

<script>

let peças=[]

function iniciar(){

let mesa=document.getElementById("mesa")
mesa.innerHTML=""

peças=[]

for(let i=0;i<=6;i++){

for(let j=i;j<=6;j++){

peças.push([i,j])

}

}

embaralhar(peças)

for(let i=0;i<7;i++){

mostrarPeça(peças[i])

}

}

function mostrarPeça(p){

let mesa=document.getElementById("mesa")

let div=document.createElement("div")

div.className="peça"

div.innerHTML=p[0]+"<hr>"+p[1]

mesa.appendChild(div)

}

function embaralhar(a){

for(let i=a.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

[a[i],a[j]]=[a[j],a[i]]

}

}

</script>

</body>

</html>

<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reis Dominó Ausus</title>

<style>

body{
background:#1e3a8a;
font-family:Arial;
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

#mesa{
margin-top:30px;
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.peça{
width:70px;
height:120px;
background:white;
color:black;
border-radius:10px;
margin:6px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:bold;
}

button{
margin-top:20px;
padding:15px;
font-size:18px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
}

</style>

</head>

<body>

<h1>Reis Dominó Ausus</h1>
<p>Criado por Jonathan</p>

<button onclick="distribuir()">Começar jogo</button>

<div id="mesa"></div>

<script>

function distribuir(){

const mesa=document.getElementById("mesa")

mesa.innerHTML=""

for(let i=0;i<7;i++){

let a=Math.floor(Math.random()*7)
let b=Math.floor(Math.random()*7)

let peça=document.createElement("div")

peça.className="peça"

peça.innerHTML=a+"<hr>"+b

mesa.appendChild(peça)

}

}

</script>

</body>
</html>

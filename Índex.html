<!DOCTYPE html>
<html>
<head>
<title>Dominó Online</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#1e3a8a;
color:white;
}

button{
padding:15px;
font-size:18px;
margin:10px;
border-radius:8px;
border:none;
background:#2563eb;
color:white;
}

#jogo{
margin-top:20px;
font-size:30px;
}
</style>
</head>

<body>

<h1>Reis Dominó Ausus</h1>
<p>Criado por Jonathan</p>

<button onclick="jogar()">Gerar Peças</button>

<div id="jogo"></div>

<script>

function jogar(){

let area=document.getElementById("jogo")

area.innerHTML=""

for(let i=0;i<7;i++){

let a=Math.floor(Math.random()*7)
let b=Math.floor(Math.random()*7)

area.innerHTML += "<div>"+a+" | "+b+"</div>"

}

}

</script>

</body>
</html>
